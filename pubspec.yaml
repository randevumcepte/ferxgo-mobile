name: ferxgo_mobile
description: "FerXGo — şoför rezervasyon uygulaması"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Routing
  go_router: ^14.6.2

  # Models / code-gen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Harita
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Konum
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Firebase (FCM push) — Faz 2'de aktif edilecek; şimdilik dependency olarak hazır
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Yardımcı
  uuid: ^4.5.1
  intl: ^0.20.0
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.0
  change_app_package_name: ^1.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code-gen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
